<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tabbed Components Demo</title>
  <script src="tabs.js" type="module" defer></script>
  <script src="video.js" type="module" defer></script>
</head>
<body>
  <ux-tab-group theme="theme.css">
    <ux-tab-entry>
      <ux-tab-title>Codecs</ux-tab-title>
      <ux-tab-panel>
        <p>This is the content for the first tab.</p>
      </ux-tab-panel>
    </ux-tab-entry>
    <ux-tab-entry>
      <ux-tab-title>Track Switching</ux-tab-title>
      <ux-tab-panel>
        <ux-video-selector render="list">
          <ux-video-sources>
            <ux-video-source src="trackz.mp4"></ux-video-source>
          </ux-video-sources>
          <ux-video-controls>
            <ux-video-control-track-switching></ux-video-control-track-switching>
          </ux-video-controls>
        </ux-video-selector>
      </ux-tab-panel>
    </ux-tab-entry>
  </ux-tab-group>
</body>
</html>
